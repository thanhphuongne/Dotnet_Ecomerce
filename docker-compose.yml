version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecomshop_postgres
    restart: always
    environment:
      POSTGRES_DB: ecomshop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres@1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecomshop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecomshop_api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ecomshop_db;Username=postgres;Password=postgres@1234;
    ports:
      - "5000:80"
    depends_on:
      - postgres
    networks:
      - ecomshop_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecomshop_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ecomshop_network

volumes:
  postgres_data:

networks:
  ecomshop_network:
    driver: bridge
